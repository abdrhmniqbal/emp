project_id_env: CROWDIN_PROJECT_ID
api_token_env: CROWDIN_PERSONAL_TOKEN
base_path: .
preserve_hierarchy: false

files:
  - source: /src/modules/localization/resources/en.json
    translation: /src/modules/localization/resources/%two_letters_code%.json
    languages_mapping:
      two_letters_code:
        pt-BR: pt
        zh-CN: zs
        zh-TW: zt
